<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GeoCore Map Engine - Soberanía Cartográfica</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #0B0D17; }
    #map-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    
    /* Frutiger Aero / Glassmorphism UI */
    .topbar {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 12px 25px;
      background: rgba(11, 13, 23, 0.4);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(100, 255, 218, 0.25);
      border-radius: 50px; /* Bubble style */
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      z-index: 1000;
    }

    .btn {
      background: linear-gradient(135deg, rgba(100, 255, 218, 0.1) 0%, rgba(100, 255, 218, 0.05) 100%);
      border: 1px solid rgba(100, 255, 218, 0.3);
      color: #64FFDA;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      outline: none;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      transition: all 0.5s ease;
      opacity: 0;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.05);
      border-color: #64FFDA;
      box-shadow: 0 0 20px rgba(100, 255, 218, 0.4);
      background: rgba(100, 255, 218, 0.2);
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn:focus-visible {
      outline: 2px solid #64FFDA;
      outline-offset: 2px;
    }

    #search-input {
      background: transparent;
      border: none;
      color: #FFF;
      outline: none;
      width: 280px;
      font-size: 15px;
    }

    #search-input:focus-visible {
      outline: 2px solid #64FFDA;
      outline-offset: 2px;
      border-radius: 4px;
    }

    #search-input::placeholder { color: rgba(100, 255, 218, 0.4); }
  </style>
</head>
<body>
  <div id="map-container"></div>

  <div class="topbar">
    <input id="search-input" type="text" placeholder="Buscar lugar..." aria-label="Buscar lugar" />
    <button class="btn" id="btn-projection">Cambiar Proyección</button>
    <button class="btn" id="btn-layer">Cargar Capa Local</button>
    <button class="btn" id="btn-3d">Vista 3D</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
