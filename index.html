<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Maps Tudex - V2 Deep Night</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #0B0D17; }
    #map-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    
    /* Frutiger Aero / Glassmorphism UI */
    .topbar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      padding: 10px 20px;
      background: rgba(11, 13, 23, 0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 255, 218, 0.2);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      z-index: 1000;
    }

    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #CCD6F6;
      padding: 8px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      outline: none;
    }

    .btn:hover {
      background: rgba(100, 255, 218, 0.15);
      border-color: rgba(100, 255, 218, 0.5);
      box-shadow: 0 0 15px rgba(100, 255, 218, 0.3);
      color: #64FFDA;
    }

    #search-input {
      background: transparent;
      border: none;
      color: #FFF;
      outline: none;
      width: 250px;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div id="map-container"></div>

  <div class="topbar">
    <input id="search-input" type="text" placeholder="Buscar lugar..." />
    <button class="btn" id="btn-layer">Cargar Capa Local</button>
    <button class="btn" id="btn-3d">Vista 3D</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
