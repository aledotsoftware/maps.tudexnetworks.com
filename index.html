<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Maps Tudex - Globo 3D</title>
  <link rel="stylesheet" href="src/styles/css/globe.css" />
</head>
<body>
  <canvas id="globe-canvas"></canvas>

  <div class="topbar">
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="Buscar ciudad, calle o lugar" autocomplete="off" />
      <div id="search-results" class="search-results"></div>
    </div>
    <select id="basemap-select" class="btn">
      <option value="osm">Calles</option>
      <option value="sat">Satélite</option>
      <option value="topo">Topográfico</option>
    </select>
    <select id="projection-select" class="btn">
      <option value="globe">Globo</option>
      <option value="mercator">Mercator</option>
      <option value="equidistant">Equidistante</option>
    </select>
    <button id="reset-map" class="btn">Restaurar mapa</button>
    <button id="route-toggle" class="btn">Ruta</button>
  </div>

  <div class="controls">
    <button id="zoom-in" class="ctrl" aria-label="Acercar" title="Acercar">+</button>
    <button id="zoom-out" class="ctrl" aria-label="Alejar" title="Alejar">-</button>
    <button id="reset-north" class="ctrl" aria-label="Orientar al norte" title="Orientar al norte">N</button>
    <button id="locate-me" class="ctrl" aria-label="Mi ubicación" title="Mi ubicación">◎</button>
  </div>

  <div id="layers-panel" class="route-panel">
    <label><input id="layer-markers" type="checkbox" checked /> Marcadores</label>
    <label><input id="layer-routes" type="checkbox" checked /> Rutas</label>
    <label><input id="layer-graticule" type="checkbox" /> Grilla</label>
  </div>

  <div id="route-panel" class="route-panel hidden route-position">
    <input id="route-from" type="text" placeholder="Origen" />
    <input id="route-to" type="text" placeholder="Destino" />
    <button id="route-build" class="btn">Trazar ruta</button>
    <div id="route-info"></div>
  </div>

  <div id="popup" class="popup hidden">
    <div id="popup-content"></div>
  </div>

  <div id="status-bar" class="status-bar">Inicializando mapa...</div>
  <div id="debug-panel" class="debug-panel hidden"></div>
  <div id="attribution" class="attribution">Datos cartográficos © OpenStreetMap contributors</div>

  <script src="src/js/globe/globe.js"></script>
</body>
</html>
